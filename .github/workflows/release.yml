name: Release

on:
  workflow_dispatch:
    inputs:
      force_version:
        description: "Force a specific version bump (leave empty for auto-detect from commits)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    concurrency: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install semantic-release
        run: pip install python-semantic-release

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -n "${{ inputs.force_version }}" ]; then
            semantic-release version --${{ inputs.force_version }}
          else
            semantic-release version
          fi

      - name: Publish release to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: semantic-release publish
