name: Release

on:
  workflow_dispatch:
    inputs:
      force_version:
        description: "Force a specific version bump (leave empty for auto-detect from commits)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    concurrency: release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install semantic-release
        run: pip install "python-semantic-release>=9.8,<10.0"

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          FORCE_VERSION: ${{ inputs.force_version }}
        run: |
          if [ -n "$FORCE_VERSION" ]; then
            semantic-release version --"$FORCE_VERSION"
          else
            semantic-release version
          fi

      - name: Publish release to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: semantic-release publish
