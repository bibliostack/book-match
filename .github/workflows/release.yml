name: Release

on:
  workflow_dispatch:
    inputs:
      force_version:
        description: "Force a specific version bump (leave empty for auto-detect from commits)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    concurrency: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install semantic-release
        run: pip install "python-semantic-release>=9.8,<10.0"

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          FORCE_VERSION: ${{ inputs.force_version }}
        run: |
          if [ -n "$FORCE_VERSION" ]; then
            semantic-release version --"$FORCE_VERSION"
          else
            semantic-release version
          fi

      - name: Publish release to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: semantic-release publish
