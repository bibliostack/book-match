name: Publish to TestPyPI

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Append dev version suffix
        run: |
          python - << 'PY'
          import datetime, pathlib, tomllib

          path = pathlib.Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          version = tomllib.loads(text)["project"]["version"]
          timestamp = datetime.datetime.now(datetime.timezone.utc).strftime("%Y%m%d%H%M%S")
          dev_version = f"{version}.dev{timestamp}"

          old_line = f'version = "{version}"'
          new_line = f'version = "{dev_version}"'
          if old_line not in text:
              raise SystemExit(f"{old_line!r} not found in pyproject.toml")

          path.write_text(text.replace(old_line, new_line, 1), encoding="utf-8")
          print(f"Publishing version: {dev_version}")
          PY

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment: testpypi
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
